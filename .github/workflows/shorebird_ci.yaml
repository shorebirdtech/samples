# Generated by shorebird_ci --style static. Safe to edit.
# Run `shorebird_ci verify` to check for dep graph drift.
name: Shorebird CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      firebase_test: ${{ steps.filter.outputs.firebase_test }}
      flavors: ${{ steps.filter.outputs.flavors }}
      multi_dimensioanl_flavors: ${{ steps.filter.outputs.multi_dimensioanl_flavors }}
      my_flutter_module: ${{ steps.filter.outputs.my_flutter_module }}
      progressive_rollout_demo: ${{ steps.filter.outputs.progressive_rollout_demo }}
      shorebird_fintech_wallet: ${{ steps.filter.outputs.shorebird_fintech_wallet }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so dorny/paths-filter can diff on push events.
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
      - run: dart pub global activate shorebird_ci
      - name: Verify CI coverage
        run: shorebird_ci verify
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            firebase_test:
              - firebase_test/**
            flavors:
              - flavors/**
            multi_dimensioanl_flavors:
              - multi_dimensional_flavors/**
            my_flutter_module:
              - add_to_app/my_flutter_module/**
            progressive_rollout_demo:
              - progressive_rollout_demo/**
            shorebird_fintech_wallet:
              - shorebird_fintech_wallet/**

  firebase_test:
    needs: changes
    if: needs.changes.outputs.firebase_test == 'true'
    uses: ./.github/workflows/_shorebird_ci_flutter.yaml
    with:
      package_name: firebase_test
      package_path: firebase_test
      has_bloc_lint: false
      has_unit_tests: true
      subpackages: ""
      flutter_version: ""
      has_integration_tests: false

  flavors:
    needs: changes
    if: needs.changes.outputs.flavors == 'true'
    uses: ./.github/workflows/_shorebird_ci_flutter.yaml
    with:
      package_name: flavors
      package_path: flavors
      has_bloc_lint: false
      has_unit_tests: true
      subpackages: ""
      flutter_version: ""
      has_integration_tests: false

  multi_dimensioanl_flavors:
    needs: changes
    if: needs.changes.outputs.multi_dimensioanl_flavors == 'true'
    uses: ./.github/workflows/_shorebird_ci_flutter.yaml
    with:
      package_name: multi_dimensioanl_flavors
      package_path: multi_dimensional_flavors
      has_bloc_lint: false
      has_unit_tests: true
      subpackages: ""
      flutter_version: ""
      has_integration_tests: false

  my_flutter_module:
    needs: changes
    if: needs.changes.outputs.my_flutter_module == 'true'
    uses: ./.github/workflows/_shorebird_ci_flutter.yaml
    with:
      package_name: my_flutter_module
      package_path: add_to_app/my_flutter_module
      has_bloc_lint: false
      has_unit_tests: true
      subpackages: ""
      flutter_version: ""
      has_integration_tests: false

  progressive_rollout_demo:
    needs: changes
    if: needs.changes.outputs.progressive_rollout_demo == 'true'
    uses: ./.github/workflows/_shorebird_ci_flutter.yaml
    with:
      package_name: progressive_rollout_demo
      package_path: progressive_rollout_demo
      has_bloc_lint: false
      has_unit_tests: true
      subpackages: ""
      flutter_version: ""
      has_integration_tests: false

  shorebird_fintech_wallet:
    needs: changes
    if: needs.changes.outputs.shorebird_fintech_wallet == 'true'
    uses: ./.github/workflows/_shorebird_ci_flutter.yaml
    with:
      package_name: shorebird_fintech_wallet
      package_path: shorebird_fintech_wallet
      has_bloc_lint: false
      has_unit_tests: true
      subpackages: ""
      flutter_version: ""
      has_integration_tests: false

  required:
    name: required
    if: ${{ always() }}
    needs:
      - changes
      - firebase_test
      - flavors
      - multi_dimensioanl_flavors
      - my_flutter_module
      - progressive_rollout_demo
      - shorebird_fintech_wallet
    runs-on: ubuntu-latest
    steps:
      - name: Check required jobs
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "All required jobs passed (or were skipped because nothing changed)."

