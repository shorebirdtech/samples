name: progressive_rollout_demo
description: "Shows how to build a progressive patch rollout system with Shorebird tracks"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.44.0 <4.0.0"

dependencies:
  cloud_firestore: ^6.6.0
  firebase_core: ^4.11.0
  flutter:
    sdk: flutter
  package_info_plus: ^10.2.0
  shared_preferences: ^2.3.3
  shorebird_code_push: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - shorebird.yaml
  uses-material-design: true
